# yaml-language-server: $schema=https://download.pactflow.io/drift/schemas/drift.testcases.v1.schema.json
drift-testcase-file: v1
title: "Full Contact API Verification (SwaggerHub Golden Source)"
sources:
  - name: fullcontact-swaggerhub
    # Pull from your published SwaggerHub API (golden source of truth)
    uri: https://api.swaggerhub.com/apis/Monahan-Tutorials/Full-Contact-Django-extract/1.0.2
    headers:
      Authorization: "Bearer ${SWAGGERHUB_API_TOKEN}"
plugins:
  - name: oas
  - name: json
  - name: http-dump

operations:

  # Test company list endpoint (using SwaggerHub operationId)
  getCompanies_Success:
    target: fullcontact-swaggerhub:api_companies_list
    description: "Retrieve list of companies (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200

  # Test contact list endpoint  
  getContacts_Success:
    target: fullcontact-swaggerhub:api_contacts_list
    description: "Retrieve list of contacts (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200

  # Test create company
  createCompany_Success:
    target: fullcontact-swaggerhub:api_companies_create
    description: "Create a new company (vs SwaggerHub spec)"
    sequence: 1
    parameters:
      request:
        body:
          name: "Drift Test Company"
          description: "Test company for SwaggerHub Drift verification"
    expected:
      response:
        statusCode: 201

  # Test mobile status endpoint (exact operationId from SwaggerHub)
  getMobileStatus_Success:
    target: fullcontact-swaggerhub:get_mobile_status
    description: "Check mobile app status (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200

  # Test desktop status 
  getDesktopStatus_Success:
    target: fullcontact-swaggerhub:get_desktop_status
    description: "Check desktop app status (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200

  # Test other key endpoints
  getNotes_Success:
    target: fullcontact-swaggerhub:api_notes_list
    description: "Retrieve notes list (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200

  getRoles_Success:
    target: fullcontact-swaggerhub:api_roles_list
    description: "Retrieve roles list (vs SwaggerHub spec)"
    sequence: 0
    expected:
      response:
        statusCode: 200