services:
  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - "80:80"
    restart: always
    volumes:
      - staticvolume:/usr/share/nginx/html/static
    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/favicon.ico > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend-dev:
    container_name: frontend-dev
    build:
      context: ./frontend
      target: development-stage
    volumes:
      - ./frontend:/app
      - ./.env:/app/.env:ro  # Copy environment file into container
    depends_on:
      - backend
    environment:
      - NODE_ENV=${NODE_ENV}
      - VITE_API_URL=${BACKEND_URL}
      - SWAGGERHUB_API_TOKEN=${SWAGGERHUB_API_TOKEN}
      - PACTFLOW_BROKER_BASE_URL=${PACTFLOW_BROKER_BASE_URL}
      - PACTFLOW_BROKER_TOKEN=${PACTFLOW_BROKER_TOKEN}

    
      
  backend:
    container_name: backend
    build:
      context: ./fc
    volumes:
      - staticvolume:/app/static
      - ./fc/fcapi/migrations:/app/fcapi/migrations  # Mount host directory to container path
      - ./.env:/app/.env:ro  # Copy environment file into container
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - PACTFLOW_BROKER_BASE_URL=${PACTFLOW_BROKER_BASE_URL}
      - PACTFLOW_BROKER_TOKEN=${PACTFLOW_BROKER_TOKEN}
      - DRIFT_TENANT_URL=${PACTFLOW_BROKER_BASE_URL}
      - SWAGGERHUB_API_TOKEN=${SWAGGERHUB_API_TOKEN}
      - SWAGGERHUB_ENDPOINT=${SWAGGERHUB_ENDPOINT}
      - SWAGGERHUB_ORGANIZATION=${SWAGGERHUB_ORGANIZATION}
      - SWAGGERHUB_API_NAME=${SWAGGERHUB_API_NAME}
      - SWAGGERHUB_API_VERSION=${SWAGGERHUB_API_VERSION}
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy


    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/api/companies/" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  staticvolume:


